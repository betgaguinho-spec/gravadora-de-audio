<html>
<head>
    <title>Professional Audio Recorder</title>
    <style>
        /* Add your CSS styles here */
    </style>
</head>
<body>
    <div class="recorder">
        <div class="tape-reels">
            <div class="left-reel">Left Reel</div>
            <div class="right-reel">Right Reel</div>
        </div>
        <div class="vu-meters">
            <div class="left-vu">Left VU</div>
            <div class="right-vu">Right VU</div>
        </div>
        <div class="faders">
            <input type="range" class="fader left-fader" />
            <input type="range" class="fader right-fader" />
        </div>
        <div class="controls">
            <button id="record">Record</button>
            <button id="play">Play</button>
            <button id="stop">Stop</button>
            <button id="rewind">Rewind</button>
            <button id="fastForward">Fast Forward</button>
        </div>
    </div>
</body>
</html>
