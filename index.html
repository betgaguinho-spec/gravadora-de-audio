<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Recorder Player</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        button {
            background-color: #333;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <h1>Audio Recorder Player</h1>
    <div>
        <button onclick="playAudio()">Play</button>
        <button onclick="stopAudio()">Stop</button>
        <button onclick="rewindAudio()">Rewind</button>
        <button onclick="fastForwardAudio()">Fast Forward</button>
    </div>
    <script>
        function playAudio() {
            // Functionality to play audio
            console.log('Playing audio...');
        }
        function stopAudio() {
            // Functionality to stop audio
            console.log('Stopping audio...');
        }
        function rewindAudio() {
            // Functionality to rewind audio
            console.log('Rewinding audio...');
        }
        function fastForwardAudio() {
            // Functionality to fast forward audio
            console.log('Fast forwarding audio...');
        }
    </script>
</body>
</html>
